    title: 'Jak zabezpieczyć API przed atakami?',

// Blog jest ręcznie redagowany – brak automatycznego generowania treści

const perPage = 6;
let currentPage = 1;
let filtered = [...posts];

function render() {
  const grid = document.getElementById('blogGrid');
  const search = document.getElementById('blogSearch').value.toLowerCase();
  const cat = document.getElementById('blogCategory').value;

  filtered = posts.filter(p => {
    const matchSearch = p.title.toLowerCase().includes(search) || p.excerpt.toLowerCase().includes(search);
    const matchCat = cat === 'all' || p.category === cat;
    return matchSearch && matchCat;
  });

  const totalPages = Math.ceil(filtered.length / perPage);
  if (currentPage > totalPages) currentPage = totalPages || 1;
  const start = (currentPage - 1) * perPage;
  const pagePosts = filtered.slice(start, start + perPage);

  if (pagePosts.length === 0) {
    const t = blogTranslations[blogLang];
    grid.innerHTML = `<div class="blog-empty"><i class="fas fa-search"></i><p>${t['blog.empty']}</p></div>`;
  } else {
    grid.innerHTML = pagePosts.map((p, i) => `
      <article class="blog-card reveal" data-delay="${(i % perPage) * 100}">
        <div class="blog-card-img" style="background: ${p.color};">
          <i class="${p.icon}"></i>
        </div>
        <div class="blog-card-body">
          <div class="blog-card-meta">
            <span class="blog-card-category">${catName(p.category)}</span>
            <span>${formatDate(p.date)}</span>
          </div>
          <h3>${p.title}</h3>
          <p>${p.excerpt}</p>
          <a href="#post-${posts.indexOf(p)}" class="btn btn-primary btn-sm read-more" data-index="${posts.indexOf(p)}">${blogTranslations[blogLang]['blog.read']} <i class="fas fa-arrow-right"></i></a>
        </div>
      </article>
    `).join('');
  }

  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }
  pag.innerHTML = Array.from({length: totalPages}, (_, i) =>
    `<button class="${i+1===currentPage?'active':''}" onclick="currentPage=${i+1};render()">${i+1}</button>`
  ).join('');

  setTimeout(observeReveal, 50);
}

function catName(c) {
  const names = {
    pl: { tech: 'Technologie', webdev: 'Web Development', ai: 'AI', business: 'Biznes' },
    en: { tech: 'Technology', webdev: 'Web Development', ai: 'AI', business: 'Business' }
  };
  return (names[blogLang] || names.pl)[c] || c;
}

function formatDate(d) {
  const months = ['stycznia','lutego','marca','kwietnia','maja','czerwca','lipca','sierpnia','września','października','listopada','grudnia'];
  const [y,m,day] = d.split('-');
  return `${parseInt(day)} ${months[parseInt(m)-1]} ${y}`;
}

document.getElementById('blogSearch').addEventListener('input', () => { currentPage = 1; render(); });
document.getElementById('blogCategory').addEventListener('change', () => { currentPage = 1; render(); });

const modal = document.getElementById('postModal');
const modalBody = document.getElementById('postModalBody');
const modalClose = document.getElementById('modalClose');

document.addEventListener('click', (e) => {
  const btn = e.target.closest('.read-more');
  if (btn) {
    e.preventDefault();
    const idx = parseInt(btn.dataset.index);
    const p = posts[idx];
    openPost(idx);
  }
});

function openPost(idx) {
  const p = posts[idx];
  if (!p) return;
  modalBody.innerHTML = `
    <h3>${p.title}</h3>
    <div class="meta">
      <span>${catName(p.category)}</span>
      <span>${formatDate(p.date)}</span>
    </div>
    ${p.content.split('\n').filter(l => l.trim()).map(l => `<p>${l}</p>`).join('')}
  `;
  modal.classList.add('open');
  history.pushState(null, '', '#post-' + idx);
  // Article structured data
  const existing = document.getElementById('blogArticleLD');
  if (existing) existing.remove();
  const ld = document.createElement('script');
  ld.id = 'blogArticleLD';
  ld.type = 'application/ld+json';
  ld.textContent = JSON.stringify({
    '@context': 'https://schema.org',
    '@type': 'Article',
    headline: p.title,
    description: p.excerpt,
    datePublished: p.date,
    author: { '@type': 'Organization', name: 'X-DEV' },
    publisher: { '@type': 'Organization', name: 'X-DEV / Dvbxtreme Sp. z o.o.' }
  });
  document.head.appendChild(ld);
}

function closePost() {
  modal.classList.remove('open');
  history.pushState(null, '', window.location.pathname);
}

modalClose.addEventListener('click', closePost);
modal.addEventListener('click', (e) => { if (e.target === modal) closePost(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && modal.classList.contains('open')) closePost(); });
window.addEventListener('popstate', () => {
  const m = location.hash.match(/^#post-(\d+)$/);
  if (m) openPost(parseInt(m[1]));
  else modal.classList.remove('open');
});

(function() {
  const m = location.hash.match(/^#post-(\d+)$/);
  if (m) { const idx = parseInt(m[1]); if (posts[idx]) setTimeout(() => openPost(idx), 100); }
})();

document.getElementById('footerYear').textContent = new Date().getFullYear();

const navbar = document.getElementById('navbar');
window.addEventListener('scroll', () => navbar.classList.toggle('scrolled', window.pageYOffset > 50));

const hamburger = document.getElementById('hamburger');
const navLinks = document.getElementById('navLinks');
hamburger.addEventListener('click', () => {
  hamburger.classList.toggle('active');
  navLinks.classList.toggle('open');
});

function observeReveal() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const delay = entry.target.dataset.delay || 0;
        setTimeout(() => entry.target.classList.add('visible'), parseInt(delay));
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
  document.querySelectorAll('.reveal:not(.visible)').forEach(el => observer.observe(el));
}

render();

let blogLang = localStorage.getItem('xdev_blog_lang') || 'pl';

function applyBlogLang(lang) {
  blogLang = lang;
  localStorage.setItem('xdev_blog_lang', lang);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  const t = blogTranslations[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    if (t[key]) el.textContent = t[key];
  });
  const search = document.getElementById('blogSearch');
  if (search) search.placeholder = t['blog.search'];
  render();
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => applyBlogLang(btn.dataset.lang));
});
